    let number = 0;
    let cron;
    let h1 = document.querySelector("h1");

    function start() {
      cron = setInterval(function () {
        number++;
        h1.innerHTML = number;
      }, 1000);
    }
    function stop() {
        clearInterval (cron)
    }
  </script>
